services:
  - type: web
    name: printia-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: printia-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTE
        value: 30
      - key: BACKEND_PUBLIC_URL
        value: https://printia-api.onrender.com
      - key: CORS_ORIGINS
        value: https://printia-web.onrender.com
      - key: CORS_ALLOW_ALL
        value: true
      - key: EMAIL_VERIFICATION_ENABLED
        value: false
      - key: SQL_ECHO
        value: false
      - key: AUTO_VERIFY_EMAILS
        value: true
      - key: ADMIN_DEFAULT_USERNAME
        sync: false
      - key: ADMIN_DEFAULT_EMAIL
        sync: false
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false
      - key: DEFAULT_KIOSK_USERNAME
        sync: false
      - key: DEFAULT_KIOSK_EMAIL
        sync: false
      - key: DEFAULT_KIOSK_PASSWORD
        sync: false
      - key: DEFAULT_USER_USERNAME
        sync: false
      - key: DEFAULT_USER_EMAIL
        sync: false
      - key: DEFAULT_USER_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_STARTTLS
        value: true
      - key: MAIL_SSL_TLS
        value: false
      - key: KIOSK_DEFAULT_EMAIL
        sync: false
      - key: KIOSK_DEFAULT_PASSWORD
        sync: false

  - type: web
    name: printia-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://printia-api.onrender.com
      - key: VITE_SUPPORT_EMAIL
        sync: false
      - key: VITE_SUPPORT_COLLABORATORS
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: printia-postgres
    databaseName: printia_db
    user: printia
